<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid-State Engine</title>
    <link rel="stylesheet" href="./hud/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        #liquid-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }
        /* Legacy HUD — hidden, still updates for Preact to read */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            opacity: 0;
        }
        /* HUD React mount point */
        #hud-app {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <canvas id="liquid-canvas"></canvas>
    <!-- Legacy HUD (hidden, feeds stats to Preact) -->
    <div id="hud">
        <div><span id="fps">0</span></div>
        <div><span id="nodes">0</span></div>
        <div><span id="dirty">0x0</span></div>
        <div><span id="status">loading...</span></div>
    </div>
    <!-- Preact HUD mount -->
    <div id="hud-app"></div>

    <script type="module" src="./main.js"></script>
    <script type="module" src="./hud/app.js"></script>
</body>
</html>
