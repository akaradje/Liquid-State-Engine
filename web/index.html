<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid-State Engine — Ultra-Lite</title>
    <link rel="stylesheet" href="./hud/style.css">
    <link rel="stylesheet" href="./style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0a14;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        #relations-svg {
            position: fixed; inset: 0;
            width: 100vw; height: 100vh;
            z-index: 50; pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Full-screen workspace (replaces canvas) -->
    <div id="workspace"></div>

    <!-- SVG layer for relationship lines (between workspace and data-boxes) -->
    <svg id="relations-svg"></svg>

    <!-- Create button (floating) -->
    <button id="create-btn">+ New Node</button>

    <!-- HUD mount (glassmorphism overlay) -->
    <div id="hud-app"></div>

    <!-- Runtime config -->
    <script>
      window.__LSE_CONFIG__ = {
        aiProvider: 'deepseek',
        enrichEndpoint: '/api/enrich',
      };
    </script>

    <script type="module" src="./main.js"></script>
    <script type="module" src="./hud/app.js"></script>
</body>
</html>
